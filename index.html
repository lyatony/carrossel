<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrossel 3D</title>
  <style>
    :root {
      --bg-start: #09111f;
      --bg-end: #1b2a41;
      --card-width: 190px;
      --card-height: 250px;
      --radius: 260px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top, rgba(120, 180, 255, 0.22), transparent 35%),
        linear-gradient(160deg, var(--bg-start), var(--bg-end));
      color: #f5f7fb;
    }

    .stage {
      width: min(90vw, 680px);
      height: min(90vw, 680px);
      display: grid;
      place-items: center;
      perspective: 1200px;
    }

    .carousel {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: spin 16s linear infinite;
    }

    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--card-width);
      height: var(--card-height);
      margin-left: calc(var(--card-width) / -2);
      margin-top: calc(var(--card-height) / -2);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(6px);
    }

    .card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .card:nth-child(1) {
      transform: rotateY(0deg) translateZ(var(--radius));
    }

    .card:nth-child(2) {
      transform: rotateY(72deg) translateZ(var(--radius));
    }

    .card:nth-child(3) {
      transform: rotateY(144deg) translateZ(var(--radius));
    }

    .card:nth-child(4) {
      transform: rotateY(216deg) translateZ(var(--radius));
    }

    .card:nth-child(5) {
      transform: rotateY(288deg) translateZ(var(--radius));
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(8, 12, 20, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
      letter-spacing: 0;
      backdrop-filter: blur(8px);
    }

    @keyframes spin {
      from {
        transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      }
      to {
        transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
      }
    }

    @media (max-width: 640px) {
      :root {
        --card-width: 130px;
        --card-height: 180px;
        --radius: 180px;
      }

      .hint {
        font-size: 12px;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="carousel" id="carousel">
      <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/Vulpes_vulpes_ssp_fulvus.jpg" alt="Paisagem 1" />
      </div>
      <div class="card">
        <img src="https://s2-vidadebicho.glbimg.com/uARs4Z928sG5wyumUy3rx9Em_g8=/0x0:1200x800/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_fb623579cd474803aedbbbbae014af68/internal_photos/bs/2022/X/L/EMuSfkTLOIfzvBHzsYAA/2022-09-20-6-raposa-e-felino-especialistas-sepultam-a-duvida.jpeg" alt="Paisagem 2" />
      </div>
      <div class="card">
        <img src="https://oeco.org.br/wp-content/uploads/oeco-migration/images/stories/abr2014/raposa-colorada.jpg" alt="Paisagem 3" />
      </div>
      <div class="card">
        <img src="https://preview.redd.it/this-bat-ear-fox-is-utterly-bemused-at-my-poor-drawing-next-v0-viaqk0lj6smf1.jpg?width=640&crop=smart&auto=webp&s=f86a7365ec3ec20daac265cbe63e97cfd1f2375e" alt="Paisagem 4" />
      </div>
      <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Lycalopex_vetulus_Carlos_Henrique_2.jpeg" alt="Paisagem 5" />
      </div>
    </div>
  </div>

  <div class="hint">Mova o mouse para inclinar o carrossel</div>

  <script>
    const carousel = document.getElementById("carousel");
    let pointerX = 0;
    let pointerY = 0;
    let autoRotate = 0;

    function render() {
      autoRotate += 0.2;
      const rotateX = -12 + pointerY * 12;
      const rotateY = autoRotate + pointerX * 35;
      const rotateZ = pointerX * 6;

      carousel.style.transform =
        `rotateX(${rotateX}deg) rotateY(${rotateY}deg) rotateZ(${rotateZ}deg)`;

      requestAnimationFrame(render);
    }

    window.addEventListener("pointermove", (event) => {
      const x = event.clientX / window.innerWidth;
      const y = event.clientY / window.innerHeight;

      pointerX = (x - 0.5) * 2;
      pointerY = (y - 0.5) * 2;
    });

    window.addEventListener("pointerleave", () => {
      pointerX = 0;
      pointerY = 0;
    });

    carousel.style.animation = "none";
    render();
  </script>
</body>
</html>
